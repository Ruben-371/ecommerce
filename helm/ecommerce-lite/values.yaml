# ══════════════════════════════════════════════════════════════════════════════
# ecommerce-lite – Helm values
# Override per environment: helm upgrade ... -f values.production.yaml
# ══════════════════════════════════════════════════════════════════════════════

global:
  imageRegistry: "registry.digitalocean.com/your-registry-name"
  imageTag: "latest"
  imagePullPolicy: IfNotPresent

# ── Ingress ────────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: "ecommerce.yourdomain.com"
  tls:
    enabled: true
    secretName: ecommerce-tls

# ── User Service ───────────────────────────────────────────────────────────────
userService:
  enabled: true
  replicaCount: 2
  image:
    repository: user-service
    tag: ""           # overridden by CI with git SHA
  service:
    port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  env:
    JWT_EXPIRES_IN: "7d"
    NODE_ENV: "production"
  # Secrets are injected from the Kubernetes Secret "app-secrets"

# ── Catalog Service ────────────────────────────────────────────────────────────
catalogService:
  enabled: true
  replicaCount: 2
  image:
    repository: catalog-service
    tag: ""
  service:
    port: 3002
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  env:
    DB_NAME: "catalog"

# ── Payment Service ────────────────────────────────────────────────────────────
paymentService:
  enabled: true
  replicaCount: 2
  image:
    repository: payment-service
    tag: ""
  service:
    port: 3003
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 128Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── MongoDB ────────────────────────────────────────────────────────────────────
mongodb:
  enabled: true
  replicaCount: 1
  image:
    repository: mongo
    tag: "7.0"
  storage:
    size: 10Gi
    storageClass: "do-block-storage"
  service:
    port: 27017

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storage:
    size: 10Gi
    storageClass: "do-block-storage"
  service:
    port: 5432
  env:
    POSTGRES_DB: "payments"
    POSTGRES_USER: "pguser"
