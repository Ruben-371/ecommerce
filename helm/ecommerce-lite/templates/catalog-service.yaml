{{- if .Values.catalogService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: catalog-service
    app.kubernetes.io/part-of: ecommerce-lite
spec:
  replicas: {{ .Values.catalogService.replicaCount }}
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: catalog-service
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.catalogService.image.repository }}:{{ .Values.catalogService.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.catalogService.service.port }}
          env:
            - name: PORT
              value: {{ .Values.catalogService.service.port | quote }}
            - name: DB_NAME
              value: {{ .Values.catalogService.env.DB_NAME | quote }}
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGODB_URI
          resources:
            {{- toYaml .Values.catalogService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.catalogService.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.catalogService.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
    - port: {{ .Values.catalogService.service.port }}
      targetPort: {{ .Values.catalogService.service.port }}
      protocol: TCP
      name: http
{{- if .Values.catalogService.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-service-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-service
  minReplicas: {{ .Values.catalogService.hpa.minReplicas }}
  maxReplicas: {{ .Values.catalogService.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.catalogService.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
