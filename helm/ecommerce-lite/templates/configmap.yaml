apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: ecommerce-lite
data:
  # Service discovery (internal DNS)
  USER_SERVICE_URL: "http://user-service:{{ .Values.userService.service.port }}"
  CATALOG_SERVICE_URL: "http://catalog-service:{{ .Values.catalogService.service.port }}"
  PAYMENT_SERVICE_URL: "http://payment-service:{{ .Values.paymentService.service.port }}"

  # MongoDB
  MONGODB_HOST: "mongodb.{{ .Release.Namespace }}.svc.cluster.local"
  MONGODB_PORT: {{ .Values.mongodb.service.port | quote }}
  DB_NAME: {{ .Values.catalogService.env.DB_NAME | quote }}

  # PostgreSQL
  POSTGRES_HOST: "postgresql.{{ .Release.Namespace }}.svc.cluster.local"
  POSTGRES_PORT: {{ .Values.postgresql.service.port | quote }}
  POSTGRES_DB: {{ .Values.postgresql.env.POSTGRES_DB | quote }}
  POSTGRES_USER: {{ .Values.postgresql.env.POSTGRES_USER | quote }}
