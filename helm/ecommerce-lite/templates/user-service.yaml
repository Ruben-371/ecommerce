{{- if .Values.userService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/part-of: ecommerce-lite
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.userService.replicaCount }}
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        version: {{ .Values.userService.image.tag | default .Values.global.imageTag | quote }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: user-service
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.userService.image.repository }}:{{ .Values.userService.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.userService.service.port }}
          env:
            - name: PORT
              value: {{ .Values.userService.service.port | quote }}
            - name: NODE_ENV
              value: {{ .Values.userService.env.NODE_ENV | quote }}
            - name: JWT_EXPIRES_IN
              value: {{ .Values.userService.env.JWT_EXPIRES_IN | quote }}
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
          resources:
            {{- toYaml .Values.userService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.userService.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.userService.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: {{ .Values.userService.service.port }}
      targetPort: {{ .Values.userService.service.port }}
      protocol: TCP
      name: http
{{- if .Values.userService.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: {{ .Values.userService.hpa.minReplicas }}
  maxReplicas: {{ .Values.userService.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.userService.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
